                        <div class="mt-auto flex items-center justify-between">

                                <span class="text-xl font-bold text-gold-400">${product.price.toLocaleString()} <span class="text-xs text-gray-500">ج.م</span></span>

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');

        function filterShop(category) {
            router.navigate('shop', { category: category === 'all' ? null : category });
        }

        function shareProduct(name, price) {
            const text = `✨ ${name} ✨\n💰 السعر: ${price.toLocaleString()} ج.م\n\nمن متجر النجم الذهبي للمجوهرات:\nhttps://wa.me/201214820829`;
            if (navigator.share) {
                navigator.share({ title: 'النجم الذهبي', text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('تم نسخ تفاصيل المنتج للمشاركة!'));
            }
        }

        // ============== ADMIN FUNCTIONS ==============

        function showAdminLogin() {
            document.getElementById('admin-login-modal').classList.remove('hidden');
            document.getElementById('admin-login-modal').classList.add('flex');
            document.getElementById('admin-password').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                store.isAdmin = true;
                store.save();
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('admin-login-modal').classList.remove('flex');
                router.navigate('admin');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logoutAdmin() {
            store.isAdmin = false;
            store.save();
            router.navigate('home');
        }

        function openProductModal(productId = null) {
            document.getElementById('product-form').reset();
            document.getElementById('p-id').value = '';
            document.getElementById('modal-title').innerText = 'إضافة منتج جديد';
            
            if (productId) {
                const p = store.products.find(x => x.id === productId);
                if (p) {
                    document.getElementById('p-id').value = p.id;
                    document.getElementById('p-name').value = p.name;
                    document.getElementById('p-price').value = p.price;
                    document.getElementById('p-oldPrice').value = p.oldPrice || '';
                    document.getElementById('p-category').value = p.category;
                    document.getElementById('p-desc').value = p.description;
                    document.getElementById('p-image').value = p.images[0];
                    document.getElementById('p-featured').checked = p.featured;
                    document.getElementById('p-popular').checked = p.popular;
                    document.getElementById('p-offer').checked = p.offer;
                    document.getElementById('p-hidden').checked = p.hidden;
                    document.getElementById('modal-title').innerText = 'تعديل منتج';
                }
            }
            
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('flex');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-modal').classList.remove('flex');
        }

        function saveProduct(e) {
            e.preventDefault();
            const idStr = document.getElementById('p-id').value;
            const isNew = !idStr;
            
            const productData = {
                id: isNew ? Date.now() : parseInt(idStr),
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                oldPrice: document.getElementById('p-oldPrice').value ? parseInt(document.getElementById('p-oldPrice').value) : null,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                images: [document.getElementById('p-image').value],
                featured: document.getElementById('p-featured').checked,
                popular: document.getElementById('p-popular').checked,
                offer: document.getElementById('p-offer').checked,
                hidden: document.getElementById('p-hidden').checked
            };

            if (isNew) {
                store.products.push(productData);
            } else {
                const idx = store.products.findIndex(p => p.id === parseInt(idStr));
                store.products[idx] = productData;
            }

            store.save();
            closeProductModal();
            router.navigate('admin');
        }

        function editProduct(id) {
            openProductModal(id);
        }

        function toggleHideProduct(id) {
            const p = store.products.find(x => x.id === id);
            if (p) {
                p.hidden = !p.hidden;
                store.save();
                router.navigate('admin');
            }
        }

        function deleteProduct(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')) {
                store.products = store.products.filter(p => p.id !== id);
                store.save();
                router.navigate('admin');
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(store.products, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `alnegm_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            alert('تم تصدير البيانات بنجاح!');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        store.products = data;
                        store.save();
                        alert('تم استيراد البيانات بنجاح!');
                        router.navigate('admin');
                    } else {
                        alert('ملف غير صالح!');
                    }
                } catch (err) {
                    alert('خطأ في قراءة الملف!');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // ============== SEARCH LOGIC ==============
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('global-search-input');
            const resultsDiv = document.getElementById('search-results');
            
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.trim();
                if (term.length < 2) {
                    resultsDiv.innerHTML = '';
                    return;
                }
                
                const matches = store.products.filter(p => !p.hidden && p.name.includes(term));
                resultsDiv.innerHTML = matches.map(p => `
                    <div onclick="router.navigate('product', {id: ${p.id}}); document.getElementById('search-modal').classList.add('hidden')" class="flex items-center gap-3 p-2 hover:bg-gray-800 rounded cursor-pointer border-b border-gray-800">
                        <img src="${p.images[0]}" class="w-10 h-10 rounded object-cover">
                        <div>
                            <div class="text-white font-bold text-sm">${p.name}</div>
                            <div class="text-gold-500 text-xs">${p.price.toLocaleString()} ج.م</div>
                        </div>
                    </div>
                `).join('');
            });
        });

        function startCountdown() {
            const timerEl = document.getElementById('countdown');
            if (!timerEl) return;
            
            let time = 3600 * 5;
            setInterval(() => {
                time--;
                const h = Math.floor(time / 3600);
                const m = Math.floor((time % 3600) / 60);
                const s = time % 60;
                timerEl.innerText = `ينتهي العرض في: ${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        // Start App
        router.navigate('home');
    </script>
</body>
</html>
