<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#D4AF37">
    <title>النجم الذهبي | متجر المجوهرات الفاخرة</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F4E4BC;
            --gold-dark: #AA8C2C;
            --black: #0a0a0a;
            --black-light: #1a1a1a;
            --white: #ffffff;
            --gray: #888888;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--black);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 4px;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
        }
        
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            transition: var(--transition);
        }
        
        .header.scrolled {
            background: rgba(10, 10, 10, 0.98);
            box-shadow: 0 4px 30px rgba(212, 175, 55, 0.1);
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: 700;
            transition: var(--transition);
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        .logo i {
            font-size: 2rem;
            animation: rotate-slow 10s linear infinite;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: var(--transition);
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 2px;
            background: var(--gold-primary);
            transition: var(--transition);
        }
        
        .nav-links a:hover {
            color: var(--gold-primary);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--gold-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--black) 0%, var(--black-light) 100%);
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }
        
        .hero-content {
            text-align: center;
            z-index: 2;
            padding: 2rem;
            animation: fadeIn 1s ease-out;
        }
        
        .hero-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            animation: float 3s ease-in-out infinite;
        }
        
        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-light) 50%, var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        
        .hero p {
            font-size: 1.25rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%);
            color: var(--black);
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;
            background: transparent;
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            border: 2px solid var(--gold-primary);
            transition: var(--transition);
            cursor: pointer;
            font-size: 1.1rem;
            margin-right: 1rem;
        }
        
        .btn-secondary:hover {
            background: var(--gold-primary);
            color: var(--black);
        }
        
        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 2rem auto;
            position: relative;
        }
        
        .search-box {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            color: var(--white);
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            transition: var(--transition);
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--gold-primary);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .search-btn {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gold-primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--black);
            transition: var(--transition);
        }
        
        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
        }
        
        /* Sections */
        .section {
            padding: 6rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .section-title h2 {
            font-size: 2.5rem;
            color: var(--gold-primary);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }
        
        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gold-primary);
        }
        
        .section-title p {
            color: var(--gray);
            font-size: 1.1rem;
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: linear-gradient(145deg, var(--black-light) 0%, var(--black) 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: var(--transition);
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.1);
        }
        
        .product-image {
            position: relative;
            height: 300px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .product-card:hover .product-image img {
            transform: scale(1.1);
        }
        
        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--gold-primary);
            color: var(--black);
            font-weight: 700;
            font-size: 0.8rem;
            border-radius: 20px;
            z-index: 2;
        }
        
        .product-badge.offer {
            background: #ff4444;
            color: white;
        }
        
        .product-actions {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            opacity: 0;
            transform: translateX(-20px);
            transition: var(--transition);
        }
        
        .product-card:hover .product-actions {
            opacity: 1;
            transform: translateX(0);
        }
        
        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black);
            transition: var(--transition);
            font-size: 1rem;
        }
        
        .action-btn:hover {
            background: var(--gold-primary);
            transform: scale(1.1);
        }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-category {
            color: var(--gold-primary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--white);
        }
        
        .product-description {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold-primary);
        }
        
        .product-price .currency {
            font-size: 0.9rem;
            font-weight: 400;
        }
        
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        
        .whatsapp-btn:hover {
            background: #128C7E;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }
        
        /* Special Offers */
        .offers-section {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            border-radius: 30px;
            padding: 4rem 2rem;
            margin: 4rem auto;
            max-width: 1400px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .offers-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotate-slow 20s linear infinite;
        }
        
        .countdown {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        
        .countdown-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--gold-primary);
            min-width: 100px;
        }
        
        .countdown-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold-primary);
            display: block;
        }
        
        .countdown-label {
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        /* Categories */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .category-card {
            position: relative;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .category-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 2rem;
            transition: var(--transition);
        }
        
        .category-card:hover {
            transform: translateY(-5px);
        }
        
        .category-card:hover img {
            transform: scale(1.1);
        }
        
        .category-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold-primary);
        }
        
        /* Product Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--black-light);
            border-radius: 20px;
            max-width: 1000px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(212, 175, 55, 0.2);
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--white);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            transition: var(--transition);
        }
        
        .modal-close:hover {
            background: var(--gold-primary);
            color: var(--black);
        }
        
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 3rem;
        }
        
        .product-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }
        
        .thumbnail-list {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            background: #1a1a1a;
        }
        
        .thumbnail:hover, .thumbnail.active {
            border-color: var(--gold-primary);
        }
        
        .product-detail-info h2 {
            font-size: 2rem;
            color: var(--gold-primary);
            margin-bottom: 1rem;
        }
        
        .product-detail-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold-primary);
            margin-bottom: 1.5rem;
        }
        
        .product-detail-description {
            color: var(--gray);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .detail-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .share-btn {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--gold-primary);
        }
        
        /* Welcome Popup */
        .welcome-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .welcome-popup.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            background: linear-gradient(145deg, var(--black-light) 0%, var(--black) 100%);
            border: 2px solid var(--gold-primary);
            border-radius: 30px;
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: var(--transition);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }
        
        .welcome-popup.active .popup-content {
            transform: scale(1);
        }
        
        .popup-icon {
            font-size: 4rem;
            color: var(--gold-primary);
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        
        .popup-content h2 {
            font-size: 2rem;
            color: var(--gold-primary);
            margin-bottom: 1rem;
        }
        
        .popup-content p {
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .popup-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .popup-close:hover {
            color: var(--gold-primary);
            transform: rotate(90deg);
        }
        
        /* Floating WhatsApp */
        .floating-whatsapp {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 999;
            animation: pulse-gold 2s infinite;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .floating-whatsapp:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.6);
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            z-index: 4000;
            overflow-y: auto;
        }
        
        .admin-panel.active {
            display: block;
        }
        
        .admin-header {
            background: var(--black-light);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .admin-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: var(--transition);
        }
        
        .admin-close:hover {
            background: rgba(255, 0, 0, 0.3);
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;

        // Share Product
        function shareProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            currentShareProduct = product;
            
            // Create canvas for share image
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1080;
            canvas.height = 1350;
            
            // Background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#0a0a0a');
            gradient.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Gold border
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 20;
            ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);
            
            // Load and draw product image
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = function() {
                // Draw image with rounded corners effect
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(100, 100, 880, 880, 20);
                ctx.clip();
                ctx.drawImage(img, 100, 100, 880, 880);
                ctx.restore();
                
                // Store name
                ctx.fillStyle = '#D4AF37';
                ctx.font = 'bold 60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('النجم الذهبي', canvas.width / 2, 1050);
                
                // Product name
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 50px Arial';
                ctx.fillText(product.name, canvas.width / 2, 1130);
                
                // Price
                ctx.fillStyle = '#D4AF37';
                ctx.font = 'bold 70px Arial';
                ctx.fillText(product.price.toLocaleString() + ' ج.م', canvas.width / 2, 1220);
                
                // Contact
                ctx.fillStyle = '#888888';
                ctx.font = '40px Arial';
                ctx.fillText('اطلب الآن: 0121 48 208 29', canvas.width / 2, 1280);
                
                // Show preview
                const dataUrl = canvas.toDataURL('image/png');
                document.getElementById('shareImage').src = dataUrl;
                document.getElementById('shareName').textContent = product.name;
                document.getElementById('sharePrice').textContent = product.price.toLocaleString() + ' ج.م';
                document.getElementById('sharePreview').classList.add('active');
                document.getElementById('shareOverlay').classList.add('active');
            };
            img.src = product.image;
        }

        // Countdown Timer
        function updateCountdown() {
            const end = new Date(offerEndTime);
            const now = new Date();
            const diff = end - now;
            
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                updateCountdownDisplay('days', days);
                updateCountdownDisplay('hours', hours);
                updateCountdownDisplay('minutes', minutes);
                updateCountdownDisplay('seconds', seconds);
                
                // Also update offer page if exists
                if (document.getElementById('offerDays')) {
                    updateCountdownDisplay('offerDays', days);
                    updateCountdownDisplay('offerHours', hours);
                    updateCountdownDisplay('offerMinutes', minutes);
                    updateCountdownDisplay('offerSeconds', seconds);
                }
            }
        }
